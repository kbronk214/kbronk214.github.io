<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Service Request | Seacoast Independent Tech Services</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header>
      <div class="nav-container">
        <img
          src="logo.png"
          class="logo"
          alt="Seacoast Independent Tech Services"
        />

        <nav>
          <a href="index.html">Home</a>
          <a href="services.html">Services</a>
          <a href="request.html">Service Request</a>
          <a href="testimonials.html">Testimonials</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section>
    <h2>Service Request</h2>
   
<form
  id="serviceForm"
  action="https://formspree.io/f/mreoogoz"
  method="POST"
>
      <label for="name">Name:</label>
      <input type="text" id="name" name="name" required />

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required />

      <label for="service">Service Needed:</label>
      <select name="service">
        <option>Computer Repair</option>
        <option>Network Setup</option>
        <option>Virus & Malware Removal</option>
        <option>Electronics Help</option>
        <option>Technology Consulting</option>
      </select>

      <label for="details">Details:</label>
      <textarea name="details"></textarea>

      <button type="submit">Submit Request</button>
      <p id="formMessage"></p>
    </form>
</section>
    </main>
    
    <footer>
      <p>© 2026 Seacoast Independent Tech Services</p>
    </footer>
    <script src="script.js" defer></script>
  </body>
</html>
