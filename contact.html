<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us | Seacoast Independent Tech Services</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
    <header>
      <div class="nav-container">
        <img
          src="logo.png"
          class="logo"
          alt="Seacoast Independent Tech Services"
        />


        <nav>
          <a href="index.html">Home</a>
          <a href="services.html">Services</a>
          <a href="request.html">Service Request</a>
          <a href="testimonials.html">Testimonials</a>
          <a href="contact.html">Contact</a>
        </nav>
      </div>
    </header>

    <main class="container">
      <section>
      <h2>Contact Us</h2>

      <p>
        If you have questions about our services or need technical support,
        please contact us at (603)123-4567 or leave us a message below</p>
    </section>

     <section>
      <h2>Send Us a Message</h2>
     <form
    id="contactForm"
    action="https://formspree.io/f/mreoogoz"
    method="POST"
      >
        <label for="name">Name:</label>
        <input type="text" id="name" name="name" required />

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required />

        <label for="message">Message:</label>
        <textarea id="message" name="message" rows="5" required></textarea>

        <button type="submit">Send Message</button>
       <p id="formMessage"></p>
      </form>
    </section>
    </main>

    <footer>
      <p>© 2026 Seacoast Independent Tech Services</p>
    </footer>
    <script>
document.getElementById("contactForm").addEventListener("submit", async function(event) {
  event.preventDefault();

  let name = document.getElementById("name").value.trim();
  let email = document.getElementById("email").value.trim();
  let message = document.getElementById("message").value.trim();
  let output = document.getElementById("formMessage");

  // Validation
  if (name === "" || email === "" || message === "") {
    output.textContent = "Please fill out all fields.";
    output.style.color = "red";
    return;
  }

  if (!email.includes("@")) {
    output.textContent = "Please enter a valid email address.";
    output.style.color = "red";
    return;
  }

  try {
    let response = await fetch(this.action, {
      method: "POST",
      body: new FormData(this),
      headers: {
        "Accept": "application/json"
      }
    });

    if (response.ok) {
      output.textContent = "Message sent successfully!";
      output.style.color = "green";
      this.reset();
    } else {
      output.textContent = "Something went wrong. Please try again.";
      output.style.color = "red";
    }
  } catch (error) {
    output.textContent = "Network error. Please check your connection.";
    output.style.color = "red";
  }
});
</script>
  </body>
</html>
